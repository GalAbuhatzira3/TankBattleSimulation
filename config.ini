sim.log.file=Simulator/Config_Simulator_log_      # prefix; timestamp + .log added
sim.log.level=debug  # the log level of the Simulator logger
sim.log.console=false  # log is printed to console if and only if true
sim.log.TID=true  # a thread ID is printed in each log line if and only if true
gm.log.file=GameManager/Config_GameManager_log_   # prefix; timestamp + .log added
gm.log.level=unknown  # the log level of the GameManager logger
gm.log.console=false  # log is printed to console if and only if true
gm.log.TID=true  # a thread ID is printed in each log line if and only if true
map.dir=maps # directory where the generated maps are stored
map.rows.max=15  # maximum number of rows in a generated map
map.cols.max=60  # maximum number of columns in a generated map
map.steps.max=1000  # maximum number of steps in a simulation
map.shells.max=100  # maximum number of shells in a simulation
map.wall.pct=30  # the probability (percentage) that a cell is a wall
map.mine.pct=10  # the probability (percentage) that a cell is a mine
map.empty.pct=50  # the probability (percentage) that a cell is empty
map.p1.pct=5  # the probability (percentage) that a cell is a player 1 tank
map.p2.pct=5  # the probability (percentage) that a cell is a player 2 tank
